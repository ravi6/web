<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Projects</title>
    <style>
        :root {
        --bg: #414141;         
        --card-bg: #2f2f2f;    
        --text: #eeeeee;       
        --text-muted: #a0a0a0; 
        --accent: #38bdf8;     
        --border: #424242;     
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        p.intro {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        h2 {
            font-size: 1.4rem;
            margin: 2.5rem 0 1rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            color: var(--text);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .card-header svg {
            width: 20px;
            height: 20px;
            color: var(--accent);
            flex-shrink: 0;
        }
        .card h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Hover Effect: Reveal hidden paragraph mechanics */
        .card p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.4;
            max-height: 0;
            opacity: 0;
            transform: translateY(4px);
            transition: max-height 0.3s ease, opacity 0.2s ease, transform 0.2s ease, margin-top 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: var(--accent);
        }
        .card:hover p {
            max-height: 100px; /* Ample space for descriptions */
            opacity: 1;
            transform: translateY(0);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <p class="intro">A collection of my web pages and experiments hosted on GitHub</p>
    </div>

    <script>
        const GH = "https://github.com/ravi6";
        const GHP = "https://ravi6.github.io";

        // Inline SVG paths map mapped by keyword keys
        const ICONS = {
           potpourri: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M12 12c-2.5-3.5-7-2-7 1.5S9.5 17 12 13.5c2.5 3.5 7 2 7-1.5S14.5 8.5 12 12z"/></svg>`,
           electronics: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"/></svg>`,
           mathematics: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 5,8 C 5,8 6.5,6.5 12,6.5 C 17.5,6.5 19,8 19,8"/><path d="M 9,7.5 C 9,11.5 8,15.5 6,19"/><path d="M 15,7.5 L 15,17 C 15,19 16.5,19.5 18,18.5"/></svg>`,
           engineering: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3M9 5h6M12 5L6 21M12 5l6 16M8 15h8"/></svg>`,

//engineering: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42 1.42"/></svg>`,



        };

        // Redesigned dynamic DOM builder function accepting icon mapping key
        function addSection(title, iconKey, cards) {
            const container = document.getElementById('app');
            const h2 = document.createElement('h2');
            h2.textContent = title;
            container.appendChild(h2);

            const grid = document.createElement('div');
            grid.className = 'grid';

            cards.forEach(([url, heading, desc]) => {
                const a = document.createElement('a');
                a.className = 'card';
                a.target = '_blank';
                a.href = url;
                a.innerHTML = `
                    <div class="card-header">
                        ${ICONS[iconKey] || ''}
                        <h3>${heading}</h3>
                    </div>
                    <p>${desc}</p>
                `;
                grid.appendChild(a);
            });

            container.appendChild(grid);
        }

        // Potpourri
        addSection("Potpourri", "potpourri", [
            ["MMs/index.htm", "MMs", "Manas's creations at the age of 5"],
            ["ragas/index.html", "Carnatic Music", "A compilation of Kritis and Ragas I enjoyed"],
            ["bath/index.html", "Bath Room Reno", "My bathroom rennovation saga"],
            ["shower/index.html", "Cold Showers", "Why you should take a cold shower"],
            [`${GH}/puzzle`, "Cross Words Puzzle", "Generating Puzzle Grid from just Clues section. A collaborative project with AI assistance"]
        ]);

        // Electronics
        addSection("Electronics", "electronics", [
            ["acunit/bldc/bldc.html", "BLDC Motor", "BrushLess DC Motor Rip. Describes my journey into BLDC motors trying to fix failed air conditioner"],
            [`${GH}/TurnTable`, "Retro Turntable Fix", "Digging into the electronics of Retro Turntable to make it sing again"],
            [`${GH}/BloodPressure`, "Blood Pressure Meter", "Reverse Engineering Blood Pressure Meteter"],
            [`${GH}/pi`, "I2C with Raspberry Pi", "DAC with interfacing I2C devices with RPi"]
        ]);

        // Mathematics
        addSection("Mathematics", "mathematics", [
            ["pnp.html", "3D Object Alignment", "An exploration of 3D Object alignment algorithm, in my early stages of pose estimation tasks"],
            [`${GHP}/learn/stat/delta/randvar.pdf`, "Random Variable", "Getting to know random variable behaviours"],
            [`${GHP}/learn/stat/bay/src/index.html`, "Bayesian Statistics", "Exploring foundational statstical methods"],
            [`${GHP}/MaxEnt/maxent.pdf`, "MaxEnt based Optimization", "A probabilistic optimization with maximization of Entropy used in coordination of multi agent environments"],
            [`${GH}/MTS`, "Montecarlo Tree Search Algorithm", "Exploration of MTS with TicToc game. A work that came to stand still with open ended quesitons. The idea is to apply this in multi-agent scenarios"],
            [`${GHP}/learn/stat/chvarint.html`, "Change of Variables in Integrals", "Includes how to handle delta functions in integrand"],
            [`${GHP}/learn/stat/wigner/wigner.html`, "Wigner Surmise", "Probability density function  of Random square matrix Eigen Value distance"]
        ]);

        // Engineering
        addSection("Engineering", "engineering", [
            [`${GH}/ThermoS`, "Process Simulation Models", "A custom library of OpenModelica based Unit Operation models for Chemical Engineers."],
            [`${GH}/PhaseCalcs`, "Phase Equillibria", "Here is web based tool to enable multi-component flash calculation"],
            [`${GH}/PSA`, "Pressure Swing Adsorption Model", "A detailed twin bed based pressure swing adsorber dynamic model using OpenModelica fluid library and ThermoS library"],
            ["obogs.html", "OBOGS Analysis", "A simple analysis of contaminants in pressure swing adsorption based oxygen generator"],
            [`${GH}/Sim`, "Axial Compressor Rig Simulation", "Comrepssor scaling laws revisited. Developed a GUI to place unit operations interactively and show simulation results dynamically"]
        ]);
    </script>
</body>
</html>
